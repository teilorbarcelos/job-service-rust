name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Lint (clippy)
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Test
      run: cargo test

    - name: Coverage
      run: |
        cargo install cargo-tarpaulin
        cargo tarpaulin --workspace --timeout 300 --out Lcov --output-dir coverage

    - name: Build
      run: cargo build --release
